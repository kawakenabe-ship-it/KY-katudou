<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KY活動表（危険予知活動）</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background-color: #f7f9fa;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .section {
            margin-bottom: 30px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="date"], textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: #fff;
        }
        th, td {
            border: 1px solid #bdc3c7;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #ecf0f1;
        }
        .btn-group {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-primary { background-color: #3498db; color: white; }
        .btn-primary:hover { background-color: #2980b9; }
        .btn-success { background-color: #2ecc71; color: white; }
        .btn-success:hover { background-color: #27ae60; }
        .btn-danger { background-color: #e74c3c; color: white; }
        .btn-danger:hover { background-color: #c0392b; }
        
        /* サインエリアのスタイル */
        .signature-container {
            margin-top: 20px;
            padding: 15px;
            border: 2px dashed #3498db;
            border-radius: 6px;
            background-color: #fafbfc;
        }
        .canvas-wrapper {
            margin: 10px 0;
        }
        canvas {
            border: 1px solid #7f8c8d;
            background-color: #fff;
            cursor: crosshair;
            touch-action: none; /* スマホでのスクロール防止 */
            max-width: 100%;
        }
        
        /* PDF出力時にボタン非表示にする設定 */
        @media print {
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

<div class="container" id="ky-form-area">
    <h1>危険予知（KY）活動表</h1>

    <div class="section">
        <table style="width:100%;">
            <tr>
                <th>日付</th>
                <td><input type="date" id="ky-date"></td>
                <th>作業指揮者</th>
                <td><input type="text" id="ky-leader" placeholder="氏名を入力"></td>
            </tr>
            <tr>
                <th>作業内容</th>
                <td colspan="3"><input type="text" id="ky-work-title" placeholder="本日の作業内容"></td>
            </tr>
        </table>
    </div>

    <div class="section">
        <h3>■ 作業従事者名簿</h3>
        <textarea id="ky-members" rows="3" placeholder="参加者の氏名をカンマ区切り、または改行で入力してください"></textarea>
    </div>

    <div class="section">
        <h3>■ 危険の予測と対策</h3>
        <table>
            <thead>
                <tr>
                    <th style="width: 50%;">潜在する危険要因（どんな災害が起きるか）</th>
                    <th style="width: 50%;">私たちの行動目標（私たちはこうする）</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><textarea id="danger-1" rows="3" placeholder="例: 足場が濡れており、滑って転落する恐れがある"></textarea></td>
                    <td><textarea id="measure-1" rows="3" placeholder="例: 足元の清掃を徹底し、安全帯を必ず使用する"></textarea></td>
                </tr>
                <tr>
                    <td><textarea id="danger-2" rows="3" placeholder="例: クレーン旋回時に吊り荷と激突する"></textarea></td>
                    <td><textarea id="measure-2" rows="3" placeholder="例: 旋回範囲内への立ち入りを禁止し、合図を徹底する"></textarea></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="section signature-container">
        <h3>■ 確認者・指揮者サイン</h3>
        <p style="font-size: 0.9em; color: #666; margin: 0 0 10px 0;">タッチペン、指、またはマウスで枠内に署名してください。</p>
        <div class="canvas-wrapper">
            <canvas id="signature-canvas" width="600" height="150"></canvas>
        </div>
        <div class="btn-group no-print">
            <button type="button" id="clear-btn" class="btn-danger">サインをクリア</button>
        </div>
    </div>

    <div class="btn-group no-print">
        <button type="button" id="pdf-btn" class="btn-success" style="font-size: 1.1em; padding: 12px 25px;">📄 PDF形式で保存（ダウンロード）</button>
        <button type="button" id="save-data-btn" class="btn-primary">ブラウザに一時保存</button>
        <button type="button" id="load-data-btn" class="btn-primary">一時保存から読込</button>
    </div>
</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        // --- 1. 手書きサイン機能の制御 ---
        const canvas = document.getElementById('signature-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        ctx.lineWidth = 3;         // 線の太さ
        ctx.lineCap = 'round';     // 線の角を丸く
        ctx.strokeStyle = '#000';  // 線の色

        // 座標取得関数（PC/スマホ両対応）
        function getEventPos(e) {
            const rect = canvas.getBoundingClientRect();
            if (e.touches && e.touches.length > 0) {
                return {
                    x: e.touches[0].clientX - rect.left,
                    y: e.touches[0].clientY - rect.top
                };
            } else {
                return {
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top
                };
            }
        }

        function startDrawing(e) {
            isDrawing = true;
            const pos = getEventPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            if(e.cancelable) e.preventDefault();
        }

        function draw(e) {
            if (!isDrawing) return;
            const pos = getEventPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            if(e.cancelable) e.preventDefault();
        }

        function stopDrawing() {
            isDrawing = false;
        }

        // マウスイベント (PC)
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);

        // タッチイベント (スマホ・タブレット・タッチペン)
        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDrawing);

        // サインクリア機能
        document.getElementById('clear-btn').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });


        // --- 2. PDF保存機能（html2pdf.js） ---
        document.getElementById('pdf-btn').addEventListener('click', () => {
            const element = document.getElementById('ky-form-area');
            
            // 操作ボタンなどを一時的に隠してPDF化するオプション
            const opt = {
                margin:       10,
                filename:     'KY活動表.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true }, 
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // PDF生成を実行
            html2pdf().set(opt).from(element).save();
        });


        // --- 3. ブラウザへのテキスト一時保存・読込機能（LocalStorage） ---
        document.getElementById('save-data-btn').addEventListener('click', () => {
            const kyData = {
                date: document.getElementById('ky-date').value,
                leader: document.getElementById('ky-leader').value,
                workTitle: document.getElementById('ky-work-title').value,
                members: document.getElementById('ky-members').value,
                danger1: document.getElementById('danger-1').value,
                measure1: document.getElementById('measure-1').value,
                danger2: document.getElementById('danger-2').value,
                measure2: document.getElementById('measure-2').value,
                // サインも画像化してデータ保存
                signature: canvas.toDataURL()
            };
            localStorage.setItem('ky_activity_data', JSON.stringify(kyData));
            alert('ブラウザにデータを一時保存しました。');
        });

        document.getElementById('load-data-btn').addEventListener('click', () => {
            const savedData = localStorage.getItem('ky_activity_data');
            if (!savedData) {
                alert('保存されたデータが見つかりません。');
                return;
            }
            const kyData = JSON.parse(savedData);
            document.getElementById('ky-date').value = kyData.date || '';
            document.getElementById('ky-leader').value = kyData.leader || '';
            document.getElementById('ky-work-title').value = kyData.workTitle || '';
            document.getElementById('ky-members').value = kyData.members || '';
            document.getElementById('danger-1').value = kyData.danger1 || '';
            document.getElementById('measure-1').value = kyData.measure1 || '';
            document.getElementById('danger-2').value = kyData.danger2 || '';
            document.getElementById('measure-2').value = kyData.measure2 || '';
            
            // サインの復元
            if (kyData.signature) {
                const img = new Image();
                img.onload = function() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
                img.src = kyData.signature;
            }
            alert('データを読み込みました。');
        });
    });
</script>

</body>
</html>
